/* ============================================================
   CLOSER. — Mobile fixes
   Pegá este bloque REEMPLAZANDO el @media(max-width:600px)
   existente al final del <style> en index.html
   ============================================================ */

@media(max-width:640px){

  /* ── NAV ── */
  .nav-in { padding: 0 16px; gap: 8px; }
  .logo { font-size: 17px; }
  .nav-link { display: none; } /* ocultar links en mobile — quedan en el menú */
  .nav-r { gap: 6px; }
  .btn-ink { padding: 7px 12px; font-size: 12px; }
  .nav-plan-badge { font-size: 9px; padding: 2px 6px; }
  .nav-avatar { width: 26px; height: 26px; font-size: 11px; }

  /* ── HERO ── */
  #hero { padding: 56px 0 48px; }
  .hero-kicker { font-size: 10px; padding: 4px 12px 4px 8px; }
  .hero-filter { border-radius: var(--r-lg); font-size: 12px; padding: 10px 16px; }
  .cta-group { gap: 10px; }
  .btn-gold { padding: 14px 24px; font-size: 14px; width: 100%; max-width: 320px; }

  /* ── SECTIONS ── */
  .w, .w-sm { padding: 0 18px; }

  /* ── APP CARD ── */
  .form-body, .out-body, .load-body, .error-body { padding: 24px 18px 28px; }
  .form-hd h2 { font-size: 21px; }
  .form-foot { flex-direction: column; gap: 12px; align-items: stretch; }
  .expand-btn { justify-content: center; }
  .btn-gold-sm { width: 100%; justify-content: center; padding: 13px; font-size: 14px; }

  /* ── MSG CARD HEADER — fix principal ── */
  .msg-head {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
  }
  .msg-meta { width: 100%; }
  .msg-actions { width: 100%; justify-content: flex-end; }
  .msg-title { font-size: 11px; flex-wrap: wrap; }
  .msg-intent { font-size: 10px; }
  .btn-copy { font-size: 10px; padding: 4px 8px; }
  .btn-feedback { font-size: 10px; padding: 4px 8px; }
  .msg-body { padding: 12px; }
  .msg-text { font-size: 13px; }

  /* ── OUT HEADER ── */
  .out-hd { flex-direction: column; align-items: flex-start; gap: 10px; }
  .out-hd h2 { font-size: 20px; }
  .btn-restart-top { align-self: flex-start; }
  .sys-banner { font-size: 12px; padding: 10px 12px; }
  .ctx-strip { padding: 10px 18px; font-size: 11px; }

  /* ── PAYWALL ── */
  .paywall { padding: 20px 16px; }
  .pw-h { font-size: 17px; }
  .pw-sub { font-size: 12px; }
  .pw-item-txt { font-size: 12px; }
  .pw-quote { padding: 12px 14px; }
  .pw-quote-text { font-size: 12px; }

  /* ── PRICING COMPARE — fix principal ── */
  .pw-compare-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .pw-compare-divider {
    text-align: center;
    padding: 2px 0;
    font-size: 10px;
  }
  .pw-compare-item { padding: 12px 14px; }
  .pw-compare-price { font-size: 19px; }
  .pw-compare-label { font-size: 9px; }

  /* ── ROI GRID ── */
  .pw-roi-grid {
    grid-template-columns: 1fr;
    gap: 8px;
    text-align: center;
  }
  .pw-roi-arrow { display: none; }
  .pw-roi-val { font-size: 18px; }
  .pw-roi-desc { font-size: 10px; }

  /* ── BTN UPGRADE ── */
  .btn-upgrade { font-size: 14px; padding: 14px 12px; }
  .pw-gtee { font-size: 11px; gap: 8px; }

  /* ── LAUNCH BANNER ── */
  .pw-launch-banner { font-size: 12px; padding: 10px 12px; }

  /* ── BRIDGE / CLICK-M ── */
  .bridge { font-size: 13px; }
  .click-m { padding: 22px 16px; }
  .click-m h3 { font-size: 18px; }
  .paywall-insight { font-size: 12px; padding: 10px 12px; }

  /* ── SOCIAL PROOF ── */
  .sp-inner { padding: 0 18px; }
  .testimonials { grid-template-columns: 1fr; gap: 12px; }
  .testi { padding: 18px 16px 14px; }
  .testi-text { font-size: 13px; }

  /* ── BEFORE/AFTER ── */
  .ba-inner { padding: 0 18px; }
  .ba-case { grid-template-columns: 1fr; gap: 20px; }
  .ba-arrow { flex-direction: row; padding: 4px 0; justify-content: flex-start; gap: 8px; }
  .ba-arrow-icon { transform: rotate(90deg); }
  .ba-arrow-label { font-size: 10px; }
  .chat-msg { font-size: 12px; padding: 8px 11px; }

  /* ── CONTRAST CARDS ── */
  .contrast-inner { padding: 0 18px; }
  .contrast-cards { grid-template-columns: 1fr; gap: 10px; }
  .contrast-title { font-size: 22px; }

  /* ── HOW/STEPS ── */
  .step { gap: 16px; }
  .step-title { font-size: 14px; }
  .step-desc { font-size: 12.5px; }

  /* ── MOTOR ── */
  .motor-inner { padding: 0 18px; }
  .motor-grid { grid-template-columns: repeat(2,1fr); }
  .motor-cell { padding: 16px 14px; }
  .motor-num { font-size: 22px; }
  .motor-title { font-size: 11.5px; }
  .motor-desc { font-size: 10.5px; }

  /* ── VS TABLE ── */
  .vs-table { margin: 32px 0 0; }
  .vs-header { grid-template-columns: 1fr 80px 80px; }
  .vs-row { grid-template-columns: 1fr 80px 80px; }
  .vs-cell { padding: 10px 12px; font-size: 12px; }
  .vs-h-cell { padding: 10px 12px; font-size: 10px; }

  /* ── ROADMAP ── */
  .roadmap-inner { padding: 0 18px; }
  .rm-grid { grid-template-columns: 1fr; gap: 10px; }
  .rm-card { padding: 18px; }
  .rm-hd h2 { font-size: 24px; }

  /* ── DASHBOARD ── */
  .dash-metrics { grid-template-columns: repeat(2,1fr); gap: 8px; }
  .dash-grid { grid-template-columns: 1fr; }
  .dash-card-val { font-size: 26px; }
  .dash-header { flex-direction: column; align-items: flex-start; gap: 12px; }

  /* ── AUTH MODAL ── */
  .modal { padding: 28px 20px; max-width: 95vw; }
  .modal-logo { font-size: 20px; }

  /* ── FEEDBACK MODAL ── */
  .feedback-box { padding: 24px 18px; max-width: 95vw; }
  .fb-btns { grid-template-columns: 1fr 1fr; gap: 8px; }
  .fb-btn { padding: 10px 8px; font-size: 13px; }

  /* ── FINAL CTA ── */
  #final { padding: 64px 0; }
  .final-h { font-size: 30px; }
  .final-sub { font-size: 14px; }

  /* ── DEMO PANEL ── */
  .demo-metrics { grid-template-columns: repeat(2,1fr); gap: 8px; }
  .demo-grid2 { grid-template-columns: 1fr; }
  .demo-gen-cta { flex-direction: column; align-items: flex-start; }
  .demo-tabs { padding: 0 12px; overflow-x: auto; }
  .demo-tab { padding: 11px 10px; font-size: 12px; white-space: nowrap; }
  .demo-ig-badge { display: none; }
  .demo-content { padding: 16px 14px 20px; }
  .dm-val { font-size: 20px; }
  .dm-label { font-size: 10px; }

  /* ── LOAD SCREEN ── */
  .load-body { padding: 40px 18px; }
  .load-h { font-size: 19px; }
  .load-list { max-width: 100%; }
  .l-item { font-size: 12px; padding: 8px 12px; }
}
